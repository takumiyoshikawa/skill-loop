name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"

      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          package_json_file: internal/sessionui/frontend/package.json
          standalone: true
          run_install: |
            - cwd: internal/sessionui/frontend
              args:
                - --frozen-lockfile

      - name: Download dependencies
        run: go mod download

      - name: Build embedded session UI
        working-directory: internal/sessionui/frontend
        run: pnpm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test -v ./...

      - name: Check schema.json is up to date
        run: |
          go run ./cmd/skill-loop schema -o schema.json.tmp
          diff schema.json schema.json.tmp || (echo "schema.json is out of sync. Run 'go run ./cmd/skill-loop schema -o schema.json' and commit." && exit 1)
