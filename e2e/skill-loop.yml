# yaml-language-server: $schema=https://raw.githubusercontent.com/takumiyoshikawa/skill-loop/refs/heads/main/schema.json

name: e2e-skill-loop
default_entrypoint: 1-impl
max_iterations: 5
router:
  runtime: codex
  model: gpt-5.3-codex
  args:
    - "--full-auto"

skills:
  1-impl:
    agent:
      runtime: claude
      model: claude-sonnet-4-5
      args:
        - "--dangerously-skip-permissions"
    next:
      - id: send-review
        skill: 2-review

  2-review:
    agent:
      runtime: codex
      model: gpt-5.3-codex
      args:
        - "--full-auto"
    next:
      - id: approve
        criteria: "If the review skill indicates that the implementation is complete."
        done: true
      - id: rework
        criteria: "If the review skill found issues that require more implementation work."
        skill: 1-impl
